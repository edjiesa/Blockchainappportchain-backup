services:

  # 1. BLOCKCHAIN NODE - IBM Microfab (Hyperledger Fabric)
  microfab:
    image: ibmcom/ibp-microfab:latest
    container_name: microfab
    ports:
      - "8080:8080"
      - "3001:3001"
    environment:
      - MICROFAB_CONFIG={"endorsing_organizations":[{"name":"org1"}],"channels":[{"name":"mychannel","endorsing_organizations":["org1"]}],"capability_level":"V2_0"}

  # 2. DATABASE OFF-CHAIN - PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: portchain-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=portchain
      - POSTGRES_PASSWORD=portchain123
      - POSTGRES_DB=portchain_offchain
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portchain -d portchain_offchain"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. BACKEND API - Node.js Express (shares microfab network)
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: fabric-backend
    network_mode: "service:microfab"
    environment:
      - MICROFAB_URL=http://127.0.0.1:8080
      - DATABASE_URL=postgresql://portchain:portchain123@portchain-db:5432/portchain_offchain
      - NODE_ENV=development
    depends_on:
      postgres:
        condition: service_healthy

  # 4. FRONTEND - React Vite (Hot-Reload)
  frontend:
    image: node:20-alpine
    container_name: react-frontend
    working_dir: /app
    volumes:
      - ../:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=http://localhost:3001
    command: sh -c "npm install -g pnpm && pnpm install && pnpm run dev -- --host 0.0.0.0 --force"
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
