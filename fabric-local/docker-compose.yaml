services:

  # 1. BLOCKCHAIN NODE - IBM Microfab (Hyperledger Fabric)
  microfab:
    image: ibmcom/ibp-microfab:latest
    container_name: microfab
    ports:
      - "8080:8080"
      - "3001:3001"
    environment:
      - MICROFAB_CONFIG={"endorsing_organizations":[{"name":"portorg"},{"name":"customsorg"},{"name":"bankorg"}],"channels":[{"name":"mychannel","endorsing_organizations":["portorg","customsorg","bankorg"]}],"chaincodes":[{"name":"portchain-cc","version":"1.0.1","format":"node","channel":"mychannel","directory":"/chaincode"}],"capability_level":"V2_0"}
    volumes:
      - ../chaincode/portchain-cc:/chaincode

  # 2. DATABASE OFF-CHAIN - PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: portchain-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=portchain
      - POSTGRES_PASSWORD=portchain123
      - POSTGRES_DB=portchain_offchain
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portchain -d portchain_offchain"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. BACKEND API - Go (Golang) Middleware
  backend:
    build:
      context: ../backend-go
      dockerfile: Dockerfile
    container_name: fabric-backend-go
    network_mode: "service:microfab"
    environment:
      - MICROFAB_URL=http://127.0.0.1:8080
      - DATABASE_URL=postgres://portchain:portchain123@postgres:5432/portchain_offchain?sslmode=disable
      - EXTERNAL_BANK_URL=http://127.0.0.1:4000
    depends_on:
      postgres:
        condition: service_healthy

  # 3a. NODE.JS FABRIC CONNECTOR
  fabric-connector:
    image: node:20-alpine
    container_name: fabric-connector
    network_mode: "service:microfab"
    environment:
      - DATABASE_URL=postgres://portchain:portchain123@postgres:5432/portchain_offchain?sslmode=disable
    working_dir: /app
    volumes:
      - ../backend:/app
    command: sh -c "npm install && node server.js"
    depends_on:
      - backend

  # 3b. EXTERNAL TIER - Bank Integration Mock
  external-bank:
    image: node:20-alpine
    container_name: external-bank-mock
    network_mode: "service:microfab"
    working_dir: /app
    volumes:
      - ../external-bank:/app
    command: sh -c "npm install && npm start"


  # 4. FRONTEND - React Vite (Hot-Reload)
  frontend:
    image: node:20-alpine
    container_name: react-frontend
    working_dir: /app
    volumes:
      - ../:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=http://localhost:3001
    command: sh -c "npm install -g pnpm && pnpm install && pnpm run dev -- --host 0.0.0.0 --force"
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
